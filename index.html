<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalyan Tracking Portal</title>
<link rel="icon" type="image/jpeg" href="logo.jpeg">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
body {
  background: linear-gradient(135deg, #fff9e6 0%, #fffbf0 50%, #fff9e6 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.container {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  flex: 1;
  padding: 40px 20px;
}
.card {
  background: white;
  padding: 40px;
  width: 500px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.10);
  text-align: center;
}
.card-logo {
  width: 110px;
  height: auto;
  display: block;
  margin: 0 auto 20px auto;
  padding: 10px;
  background: white;
  border-radius: 14px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.15), 0 2px 5px rgba(0,0,0,0.08);
}
.card h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 10px; line-height: 1.3; }
.subtitle { color: #6b7280; font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
.option-box { display: flex; gap: 16px; margin-bottom: 24px; }
.option {
  flex: 1;
  border: 2px solid #e5e7eb;
  padding: 18px 12px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
  text-align: center;
  background: white;
  transition: all 0.25s ease;
  user-select: none;
}
.option span { display: block; margin-top: 8px; font-size: 13px; }
.option:hover {
  border-color: #f4b400;
  background: #fff7e0;
  transform: translateY(-3px);
  box-shadow: 0 8px 18px rgba(0,0,0,0.08);
}
.option.active {
  border-color: #f59e0b;
  background: #fff7e6;
  box-shadow: 0 4px 12px rgba(245,158,11,0.2);
}
.input-hint {
  font-size: 12px;
  color: #9ca3af;
  margin-top: -2px;
  margin-bottom: 14px;
  text-align: left;
  line-height: 1.5;
}
.input-section { text-align: left; margin-bottom: 4px; }
.input-section label { font-size: 14px; font-weight: 600; color: #374151; }
.input-section input {
  width: 100%;
  padding: 13px 14px;
  margin-top: 8px;
  margin-bottom: 6px;
  border: 1.5px solid #d1d5db;
  border-radius: 8px;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  color: #1a1a1a;
}
.input-section input:focus {
  border-color: #f59e0b;
  box-shadow: 0 0 0 3px rgba(245,158,11,0.12);
}
.search-btn {
  width: 100%;
  padding: 14px;
  background: #f4b400;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  color: #1a1a1a;
  transition: background 0.2s, transform 0.1s;
  margin-top: 6px;
}
.search-btn:hover { background: #e6a500; transform: translateY(-1px); }
.search-btn:active { transform: translateY(0); }
.search-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
#result { margin-top: 22px; font-size: 14px; line-height: 1.6; }
.tracking-card {
  background: #f9fafb;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  padding: 22px;
  text-align: left;
  animation: fadeIn 0.35s ease;
}
@keyframes fadeIn {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.tracking-card h3 {
  font-size: 15px;
  font-weight: 700;
  color: #7a0000;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 2px solid #f0e0e0;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tracking-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 9px 0;
  border-bottom: 1px solid #f0f0f0;
  font-size: 14px;
}
.tracking-row:last-child { border-bottom: none; }
.tracking-row .label { color: #6b7280; font-weight: 500; min-width: 130px; }
.tracking-row .value { color: #1a1a1a; font-weight: 600; text-align: right; word-break: break-all; }
.msg-error {
  background: #fff1f1;
  border: 1px solid #fecaca;
  color: #b91c1c;
  border-radius: 10px;
  padding: 16px 18px;
  font-size: 14px;
  font-weight: 500;
  animation: fadeIn 0.3s ease;
  text-align: left;
}
.msg-searching {
  color: #6b7280;
  font-size: 14px;
  padding: 16px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.spinner {
  width: 18px;
  height: 18px;
  border: 3px solid #f0e0a0;
  border-top-color: #f4b400;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.result-count {
  font-size: 13px;
  margin-bottom: 12px;
  text-align: left;
  padding: 8px 12px;
  background: #f0fdf4;
  border-radius: 8px;
  border: 1px solid #bbf7d0;
  color: #166534;
}
footer { text-align: center; font-size: 13px; padding: 18px 20px; color: #9ca3af; }
@media (max-width: 768px) {
  .container { padding: 20px 12px; }
  .card { width: 100%; padding: 28px 20px; }
  .card h1 { font-size: 19px; }
  .card-logo { width: 90px; }
  .option-box { flex-direction: column; gap: 12px; }
  .option { padding: 14px 12px; }
}
@media (max-width: 480px) {
  .card { padding: 22px 16px; }
  .card h1 { font-size: 17px; }
  .search-btn { font-size: 15px; padding: 13px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <img src="logo.jpeg" class="card-logo" alt="Kalyan Logo">
    <h1>Kalyan Magazine<br>Tracking Details</h1>
    <p class="subtitle">Use your registered Mobile Number or Customer ID to view your dispatch information.</p>
    <div class="option-box">
      <div class="option active" onclick="selectOption('mobile', this)">
        📱 <span>Mobile Number</span>
      </div>
      <div class="option" onclick="selectOption('customer', this)">
        🪪 <span>Customer ID</span>
      </div>
    </div>
    <div class="input-section">
      <label id="inputLabel">Registered Mobile Number *</label>
      <input
        type="tel"
        id="searchInput"
        placeholder="Enter 10-digit mobile number"
        oninput="clearResult()"
        onkeydown="if(event.key==='Enter') searchCustomer()"
        autocomplete="off"
        spellcheck="false"
      />
    </div>
    <p class="input-hint" id="inputHint">Enter your 10-digit registered mobile number.</p>
    <button class="search-btn" id="searchBtn" onclick="searchCustomer()">
      Verify &amp; Continue →
    </button>
    <div id="result"></div>
  </div>
</div>
<footer>© 2024 Kalyan Centenary. All rights reserved.</footer>

<script>
// ─── IMPORTANT: This URL must match your LATEST deployed Apps Script ──────────
// If you redeploy the Apps Script, update this URL to the new deployment URL.
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxXVwv8sjph7eHBZSLI7TIOVaiftKVJsoWZCsrVWv54dhTnpVHGzjnj3LX7cjqCO_bM/exec";

let mode = "mobile";

function selectOption(type, el) {
  mode = type;
  document.querySelectorAll(".option").forEach(o => o.classList.remove("active"));
  el.classList.add("active");
  const label = document.getElementById("inputLabel");
  const input = document.getElementById("searchInput");
  const hint  = document.getElementById("inputHint");
  input.value = "";
  document.getElementById("result").innerHTML = "";
  if (type === "mobile") {
    label.innerText   = "Registered Mobile Number *";
    input.placeholder = "Enter 10-digit mobile number";
    input.type        = "tel";
    hint.innerText    = "Enter your 10-digit registered mobile number.";
  } else {
    label.innerText   = "Customer ID *";
    input.placeholder = "Enter Customer ID";
    input.type        = "text";
    hint.innerHTML    = "";
  }
  input.focus();
}

function clearResult() {
  const result = document.getElementById("result");
  if (result.querySelector(".msg-error")) {
    result.innerHTML = "";
  }
}

/* Safely format a date string from the server */
function safeFormatDate(dateStr) {
  if (!dateStr || dateStr === "—") return "—";
  // Already formatted as dd/mm/yyyy or dd-mm-yyyy
  if (/^\d{2}[\/\-]\d{2}[\/\-]\d{4}$/.test(dateStr)) {
    return dateStr.replace(/-/g, "/");
  }
  // Try native parse (handles ISO strings)
  const d = new Date(dateStr);
  if (!isNaN(d.getTime())) {
    const dd = String(d.getDate()).padStart(2, "0");
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    return `${dd}/${mm}/${d.getFullYear()}`;
  }
  return dateStr;
}

function buildCard(r, index, total) {
  const heading = total > 1 ? `Record ${index + 1} of ${total}` : "Tracking Details";
  const date    = safeFormatDate(r.date);
  return `
    <div class="tracking-card" style="margin-bottom:${index < total - 1 ? "16px" : "0"}">
      <h3>✅ ${heading}</h3>
      <div class="tracking-row">
        <span class="label">Customer ID</span>
        <span class="value">${r.customerId || "—"}</span>
      </div>
      <div class="tracking-row">
        <span class="label">Tracking ID</span>
        <span class="value">${r.trackingId || "—"}</span>
      </div>
      <div class="tracking-row">
        <span class="label">Mobile Number</span>
        <span class="value">${r.mobile || "—"}</span>
      </div>
      <div class="tracking-row">
        <span class="label">Dispatch Month</span>
        <span class="value">${r.dispatchMonth || "—"}</span>
      </div>
      <div class="tracking-row">
        <span class="label">Date</span>
        <span class="value">${date}</span>
      </div>
    </div>`;
}

async function searchCustomer() {
  const input  = document.getElementById("searchInput");
  const value  = input.value.trim();
  const result = document.getElementById("result");
  const btn    = document.getElementById("searchBtn");

  // ── Validation ──────────────────────────────────────────────────────────────
  if (!value) {
    result.innerHTML = `<div class="msg-error">⚠️ Please enter your ${mode === "mobile" ? "mobile number" : "Customer ID"}.</div>`;
    input.focus();
    return;
  }

  if (mode === "mobile") {
    const digits = value.replace(/\D/g, "");
    if (digits.length !== 10) {
      result.innerHTML = `<div class="msg-error">⚠️ Please enter a valid 10-digit mobile number.</div>`;
      input.focus();
      return;
    }
  } else {
    if (value.replace(/\D/g, "").length < 2) {
      result.innerHTML = `<div class="msg-error">⚠️ Please enter at least 2 digits of your Customer ID.</div>`;
      input.focus();
      return;
    }
  }

  // ── Fire request ────────────────────────────────────────────────────────────
  result.innerHTML = `<div class="msg-searching"><span class="spinner"></span> Searching, please wait…</div>`;
  btn.disabled = true;
  btn.textContent = "Searching…";

  // For mobile: send only digits. For customer ID: send as-is so Apps Script handles it.
  const queryValue = mode === "mobile" ? value.replace(/\D/g, "") : value;

  const url = `${APPS_SCRIPT_URL}?query=${encodeURIComponent(queryValue)}&type=${mode}&t=${Date.now()}`;

  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const data = await response.json();
    console.log("Server response:", JSON.stringify(data));

    if (data.status === "found") {
      const records = data.records;
      const count   = records.length;
      let html = "";
      if (count > 1) {
        html += `<p class="result-count">📋 ${count} records found</p>`;
      }
      for (let i = 0; i < count; i++) {
        html += buildCard(records[i], i, count);
      }
      result.innerHTML = html;

    } else if (data.status === "error") {
      result.innerHTML = `<div class="msg-error">❌ Server error: ${data.message}</div>`;

    } else {
      // not_found
      const tip = mode === "customer"
        ? `<br><small>Try entering just the number part — e.g. <b>2566</b> instead of <b>1Y/2566</b>.</small>`
        : "";
      result.innerHTML = `<div class="msg-error">❌ No record found. Please check your ${mode === "mobile" ? "mobile number" : "Customer ID"} and try again.${tip}</div>`;
    }

  } catch (err) {
    console.error("Fetch error:", err);
    result.innerHTML = `<div class="msg-error">❌ Connection error. Please check your internet and try again.</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "Verify & Continue →";
  }
}
</script>
</body>
</html>
